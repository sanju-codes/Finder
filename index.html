<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width,initial-scale=1.0">

<meta name="theme-color"
content="#2563EB">

<meta name="description"
content="Finder - Find nearby Hotels, Hospitals, ATM, Fuel Stations and more.">

<title>Finder</title>

<link rel="manifest"
href="manifest.json">

<link rel="stylesheet"
href="style.css">

<link rel="preconnect"
href="https://fonts.googleapis.com">

<link rel="preconnect"
href="https://fonts.gstatic.com"
crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

</head>

<body>

<div class="container">

<!-- HEADER -->

<header class="header">

<div class="logo">

<i class="fa-solid fa-location-dot"></i>

<h1>Finder</h1>

</div>

<button
id="menuBtn"
class="menu-btn">

<i class="fa-solid fa-bars"></i>

</button>

</header>

<!-- LOCATION CARD -->

<section class="hero">

<div class="hero-left">

<span class="label">

Current Location

</span>

<h2
id="locationName">

Detecting...

</h2>

<p
id="weatherText">

Loading Weather...

</p>

</div>

<div class="hero-right">

<img
id="weatherIcon"
src="assets/icons/weather.png"
alt="Weather">

<h2
id="temperature">

--°C

</h2>

</div>

</section>

<!-- TOP AD -->

<section class="top-ad">

<div class="ad-box">

Advertisement Space

</div>

</section>

<!-- SEARCH -->

<section class="search-box">

<i class="fa-solid fa-magnifying-glass"></i>

<input

type="search"

id="searchInput"

placeholder="Search nearby places...">

</section>

<!-- GRID -->

<section class="grid">

<button
class="card"
onclick="findPlace('hotel')">

<span>🏨</span>

<h3>Hotels</h3>

</button>

<button
class="card"
onclick="findPlace('fuel station')">

<span>⛽</span>

<h3>Fuel Stations</h3>

</button>

<button
class="card"
onclick="findPlace('ATM')">

<span>🏧</span>

<h3>ATM</h3>

</button>

<button
class="card"
onclick="findPlace('hospital')">

<span>🏥</span>

<h3>Hospitals</h3>

</button>

<button
class="card"
onclick="findPlace('medical shop')">

<span>💊</span>

<h3>Medical Shops</h3>

</button>

<button
class="card"
onclick="findPlace('bus stop')">

<span>🚏</span>

<h3>Bus Stops</h3>

</button>

<button
class="card"
onclick="findPlace('Akshaya Center')">

<span>🏢</span>

<h3>Akshaya Centers</h3>

</button>

<button
class="card"
onclick="refreshLocation()">

<span>📍</span>

<h3>Refresh Location</h3>

</button>

</section>

<!-- QUICK ACTIONS -->

<section class="quick-actions">

<button onclick="shareApp()">

<i class="fa-solid fa-share-nodes"></i>

<span>Share</span>

</button>

<button onclick="toggleDarkMode()">

<i class="fa-solid fa-moon"></i>

<span>Dark Mode</span>

</button>

<button onclick="installApp()">

<i class="fa-solid fa-download"></i>

<span>Install</span>

</button>

</section>

<!-- BOTTOM AD -->

<section class="bottom-banner">

<div class="banner">

<h3>Advertisement</h3>

<p>Google AdSense Banner</p>

</div>

</section>

<!-- BOTTOM NAVIGATION -->

<nav class="bottom-nav">

<button class="active">

<i class="fa-solid fa-house"></i>

<span>Home</span>

</button>

<button>

<i class="fa-solid fa-heart"></i>

<span>Favorites</span>

</button>

<button onclick="refreshLocation()">

<i class="fa-solid fa-location-dot"></i>

<span>Nearby</span>

</button>

<button>

<i class="fa-solid fa-gear"></i>

<span>Settings</span>

</button>

</nav>

</div>

<script src="script.js"></script>

</body>

</html>
